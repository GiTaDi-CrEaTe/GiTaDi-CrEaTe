name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 🚀 THE FIX: Bumped to v4
      - uses: actions/checkout@v4
      
      # 🚀 THE FIX: Bumped to the latest 0.9.2 version to clear Node 20 warning
      - uses: yoshi389111/github-profile-3d-contrib@0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          # 🛡️ THE FIX: Only commit if there are changes, otherwise exit 0 (success)
          git diff --staged --quiet || (git commit -m "feat: auto-generate 3D contribution graph" && git push)
