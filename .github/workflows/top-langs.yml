name: Generate Top Languages

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: top-langs.svg
          # The standard GitHub token is all we need
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Disable the base profile stats (we just want the languages)
          base: ""
          
          # Enable the Languages Plugin
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage
          plugin_languages_indepth: false
